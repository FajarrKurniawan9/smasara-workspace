version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries.sql" # Tempat lu nulis kueri CRUD (SELECT, INSERT, dll)
    schema: "internal/database/schema.sql" # Tempat lu nyimpen struktur tabel
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
