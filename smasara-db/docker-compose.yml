services:
  postgres:
    image: postgres:15-alpine
    container_name: smasara_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 531269
      POSTGRES_DB: smasara_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
